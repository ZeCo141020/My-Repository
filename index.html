<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { 
            background: radial-gradient(circle, #100005 0%, #000000 100%); 
            overflow: hidden; 
            margin: 0; 
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-content {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            pointer-events: none;
        }
        
        .center-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
        }

        /* 💖 EDM Music Visualizer အသည်းပုံ အိမ်ရာ */
        .neon-heart-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* JavaScript ဖြင့် စည်းချက်ညီညီ လှိုင်းတွန့်ကစားမည့် SVG */
        .neon-heart-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: rgba(0, 0, 0, 0.6);
            stroke: var(--neon-color, #ff1a4a);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            /* ပြင်းထန်ပြီး အထာကျသော EDM နီယွန်မီးရောင် */
            filter: drop-shadow(0 0 15px var(--neon-color, #ff1a4a))
                    drop-shadow(0 0 45px var(--neon-color, #ff1a4a));
            will-change: transform, filter;
            z-index: 2;
        }

        .heart-wings {
            position: absolute;
            font-size: 16rem;
            color: var(--neon-color, #00f0ff);
            opacity: 0.5;
            filter: drop-shadow(0 0 20px var(--neon-color, #00f0ff));
            animation: wingFlap 0.5s infinite alternate ease-in-out;
            z-index: 1;
            user-select: none;
        }

        @keyframes wingFlap {
            0% { transform: scaleX(0.85) scaleY(0.95); opacity: 0.3; }
            100% { transform: scaleX(1.15) scaleY(1.05); opacity: 0.6; }
        }
        
        .love-text {
            position: absolute;
            text-align: center;
            color: #fff;
            font-size: 2.5rem; 
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,0,0,1);
            pointer-events: none;
            z-index: 11; 
            width: 85%;
            margin-top: -25px; 
        }

        .sub-text {
            font-size: 1.3rem;
            color: #ffd670;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        .burst-element { 
            position: absolute; 
            user-select: none;
            z-index: 20;
            top: 50%; left: 50%;
            pointer-events: none;
            font-weight: bold;
            filter: drop-shadow(0 0 6px currentColor);
            will-change: transform, opacity;
        }
    </style>
</head>
<body>

    <!-- တကယ့်မီးပန်းများနှင့် ကြယ်စင်မှုန်များဆွဲမည့် ကင်းဗတ် -->
    <canvas id="starfield"></canvas>

    <div class="main-content" id="mainContent">
        <div class="center-container">
            <div class="neon-heart-wrapper">
                <div class="heart-wings">🦋</div>
                
                <!-- ⚡ 🎵 လှိုင်းတွန့်ဒီဇိုင်းဖြစ်အောင် ဖွဲ့စည်းမှုပုံစံ ID တပ်ဆင်ထားသော SVG Path -->
                <svg class="neon-heart-svg" viewBox="0 0 32 32">
                    <path id="visualizerHeart" d="M16,28.261L4.636,16.897C1.411,13.672,1.411,8.435,4.636,5.21c3.225-3.225,8.462-3.225,11.364,0 c2.902-3.225,8.139-3.225,11.364,0c3.225,3.225,3.225,8.462,0,11.687L16,28.261z" />
                </svg>
                
                <div class="love-text">
                    <div>ချစ်တယ် ❤️</div>
                    <div class="sub-text">မင်းလေးတစ်ယောက်တည်းကိုပဲ...</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        var neonColors = ['#ff1a4a', '#00f0ff', '#bd00ff', '#00ff66', '#ff00aa', '#ffaa00', '#ff00ff', '#00ffff'];
        var romanticShapes = ['❤️', '💖', '💝', '💘', '💕', '💗', '💓', '💞', '🌸', '🌹', '✨'];
        
        var colorIndex = 0;
        var shapeIndex = 0;

        window.onload = function() {
            initAdvancedEffects();
            setInterval(createExplosiveElement, 50); 
            startNeonCycle();
            startEDMVisualizer(); // ⚡ EDM လှိုင်းတွန့်စနစ်အား စတင်မောင်းနှင်ခြင်း
        };

        function startNeonCycle() {
            var heartSvg = document.querySelector('.neon-heart-svg');
            var wings = document.querySelector('.heart-wings');
            var idx = 0;
            setInterval(function() {
                idx = (idx + 1) % neonColors.length;
                var nextColor = neonColors[idx];
                var wingColor = neonColors[(idx + 3) % neonColors.length];
                if (heartSvg) heartSvg.style.setProperty('--neon-color', nextColor);
                if (wings) wings.style.setProperty('--neon-color', wingColor);
            }, 1200);
        }

        // 🎵 ⚡ EDM Music စည်းချက်အတိုင်း အသည်းပုံဘောင်များကို အတွန့်လိုင်းများအဖြစ် ဖန်တီးပေးသည့် အဆင့်မြင့်စနစ်
        function startEDMVisualizer() {
            var heartPath = document.getElementById('visualizerHeart');
            var heartSvg = document.querySelector('.neon-heart-svg');
            var baseD = "M16,28.261L4.636,16.897C1.411,13.672,1.411,8.435,4.636,5.21c3.225-3.225,8.462-3.225,11.364,0 c2.902-3.225,8.139-3.225,11.364,0c3.225,3.225,3.225,8.462,0,11.687L16,28.261z";
            
            var time = 0;
            setInterval(function() {
                time += 0.4;
                // EDM Bass သံစဉ်ကဲ့သို့ ပြင်းထန်ပြီး မြန်ဆန်သော လှိုင်းအတွန့်အတက်အကျ တွက်ချက်ခြင်း
                var beatFactor = 1 + Math.abs(Math.sin(time * 2)) * 0.08; 
                var waveIntensity = Math.sin(time * 3) * 0.8; 
                
                if (heartSvg) {
                    heartSvg.style.transform = 'scale(' + beatFactor + ')';
                }
                
                // SVG Path ကို လှိုင်းအတွန့်ပုံစံဖြစ်အောင် ပုံပျက် (Deform) စေခြင်း
                if (heartPath) {
                    // အခြေခံပုံသဏ္ဌာန်ပေါ်တွင် လျှပ်စစ်လှိုင်းအတွန့်ကဲ့သို့ ကခုန်စေရန် ချိန်ညှိခြင်း
                    var waveD = "M16,28.261 L" + (4.636 + waveIntensity) + "," + (16.897 - waveIntensity) + " C" + (1.411 - waveIntensity) + "," + (13.672 + waveIntensity) + " " + (1.411 + waveIntensity) + "," + (8.435 - waveIntensity) + " " + (4.636) + "," + (5.21 + waveIntensity) + " C" + (7.861 - waveIntensity) + "," + (1.985) + " " + (13.098 + waveIntensity) + "," + (1.985) + " 16," + (5.21 - waveIntensity) + " C" + (18.902 - waveIntensity) + "," + (1.985) + " " + (24.139 + waveIntensity) + "," + (1.985) + " " + (27.364) + "," + (5.21 - waveIntensity) + " C" + (30.589 + waveIntensity) + "," + (8.435 + waveIntensity) + " " + (30.589 - waveIntensity) + "," + (13.672 - waveIntensity) + " " + (27.364 - waveIntensity) + "," + (16.897) + " L16,28.261z";
                    heartPath.setAttribute('d', waveD);
                }
            }, 40); // 0.04 စက္ကန့်တိုင်း စည်းချက်ညီညီ အလွန်မြန်ဆန်စွာ လှိုင်းထစေခြင်း
        }

        function createExplosiveElement() {
            var item = document.createElement('div');
            item.classList.add('burst-element');
            
            item.innerText = romanticShapes[shapeIndex];
            var randomColor = neonColors[colorIndex % neonColors.length];
            item.style.color = randomColor;

            shapeIndex = (shapeIndex + 1) % romanticShapes.length;
            colorIndex = (colorIndex + 1) % neonColors.length;
            
            item.style.fontSize = (Math.random() * 20 + 32) + 'px'; 
            
            var angleIndex = Math.floor(Math.random() * 16);
            var angle = (angleIndex / 16) * Math.PI * 2;
            
            var maxDistance = Math.max(window.innerWidth, window.innerHeight) * 0.75;
            var duration = Math.random() * 1.5 + 2.5; 
            var uniqueStyleName = 'burstAnim_' + Math.random().toString(36).substr(2, 9);
            
            var amp = Math.random() * 50 + 30; 
            var moveX1 = Math.cos(angle) * (maxDistance * 0.3) + Math.sin(angle) * amp;
            var moveY1 = Math.sin(angle) * (maxDistance * 0.3) - Math.cos(angle) * amp;
            var moveX2 = Math.cos(angle) * (maxDistance * 0.65) - Math.sin(angle) * amp;
            var moveY2 = Math.sin(angle) * (maxDistance * 0.65) + Math.cos(angle) * amp;
            var finalX = Math.cos(angle) * maxDistance;
            var finalY = Math.sin(angle) * maxDistance;

            var styleSheet = document.createElement("style");
            styleSheet.innerText = `@keyframes ${uniqueStyleName} {
                0% { transform: translate(-50%, -50%) translate(0, 0) scale(0.4) rotate(0deg); opacity: 0; }
                15% { opacity: 1; }
                40% { transform: translate(-50%, -50%) translate(${moveX1}px, ${moveY1}px) scale(0.9) rotate(180deg); }
                70% { transform: translate(-50%, -50%) translate(${moveX2}px, ${moveY2}px) scale(1.3) rotate(420deg); opacity: 1; }
                100% { transform: translate(-50%, -50%) translate(${finalX}px, ${finalY}px) scale(0.7) rotate(720deg); opacity: 0; }
            }`;
            document.head.appendChild(styleSheet);
            
            item.style.animation = `${uniqueStyleName} ${duration}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
            
            document.body.appendChild(item);
            
            setTimeout(function() { 
                item.remove(); 
                styleSheet.remove();
            }, duration * 1000);
        }
        function initAdvancedEffects() {
            var canvas = document.getElementById('starfield');
            if(!canvas) return;
            var ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            var stars = [];
            var fireworkParticles = [];

            for(var i=0; i<40; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.2 + 0.5,
                    speed: Math.random() * 0.2 + 0.1
                });
            }

            function createRealFirework() {
                var startX = Math.random() * canvas.width;
                var startY = Math.random() * (canvas.height * 0.5) + 60;
                var fwColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                
                for(var j=0; j<60; j++) {
                    var angle = Math.random() * Math.PI * 2;
                    var speed = Math.random() * 4 + 1; 
                    fireworkParticles.push({
                        x: startX,
                        y: startY,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        alpha: 1,
                        color: fwColor,
                        size: Math.random() * 1.5 + 1.5,
                        gravity: 0.04, 
                        fade: Math.random() * 0.015 + 0.01
                    });
                }
            }

            setInterval(createRealFirework, 500);

            function draw() {
                if (!ctx || !canvas) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
                stars.forEach(function(s) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                    s.y += s.speed;
                    if(s.y > canvas.height) s.y = 0;
                });

                fireworkParticles.forEach(function(p, index) {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = p.color;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity; 
                    p.alpha -= p.fade; 
                    
                    if(p.alpha <= 0) {
                        fireworkParticles.splice(index, 1);
                    }
                });
                
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
