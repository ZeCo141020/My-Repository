<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { 
            background: radial-gradient(circle, #1a0007 0%, #000000 100%); 
            overflow: hidden; 
            margin: 0; 
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        .main-content {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .center-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .neon-heart-wrapper {
            position: relative;
            width: 340px;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .neon-heart-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: rgba(20, 0, 5, 0.7); 
            stroke: var(--neon-color, #ff0055);
            stroke-width: 1.5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 12px var(--neon-color, #ff0055))
                    drop-shadow(0 0 30px var(--neon-color, #ff0055))
                    drop-shadow(0 0 60px var(--neon-color, #ff0055));
            animation: pulseGlow 1.2s infinite alternate ease-in-out;
            z-index: 2;
        }

        .heart-wings {
            position: absolute;
            font-size: 16rem;
            color: var(--neon-color, #00f0ff);
            opacity: 0.6;
            filter: drop-shadow(0 0 25px var(--neon-color, #00f0ff));
            animation: wingFlap 0.6s infinite alternate ease-in-out;
            z-index: 1;
            user-select: none;
        }

        @keyframes wingFlap {
            0% { transform: scaleX(0.85) scaleY(1); opacity: 0.4; }
            100% { transform: scaleX(1.15) scaleY(1.05); opacity: 0.7; }
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        
        .love-text {
            position: absolute;
            text-align: center;
            color: #fff;
            font-size: 2.5rem; 
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,0,0,1);
            pointer-events: none;
            z-index: 11; 
            width: 80%;
            margin-top: -30px; 
            animation: textPulse 1.2s infinite alternate ease-in-out;
        }

        .sub-text {
            font-size: 1.3rem;
            color: #ffd670;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        @keyframes textPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* 💎 အရပ် ၁၆ မျက်နှာသို့ လွင့်စင်မည့် ပုံရုပ်မှုန်များ */
        .burst-element { 
            position: absolute; 
            user-select: none;
            z-index: 5;
            top: 50%; left: 50%; /* စခရင်အလယ်ဗဟိုမှ စတင်ရန် အသေသတ်မှတ်ခြင်း */
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="main-content" id="mainContent">
        <div class="center-container">
            <div class="neon-heart-wrapper">
                <div class="heart-wings">🦋</div>
                <svg class="neon-heart-svg" viewBox="0 0 32 32">
                    <path d="M16,28.261L4.636,16.897C1.411,13.672,1.411,8.435,4.636,5.21c3.225-3.225,8.462-3.225,11.364,0 c2.902-3.225,8.139-3.225,11.364,0c3.225,3.225,3.225,8.462,0,11.687L16,28.261z" stroke-width="1.2" stroke-linejoin="round"/>
                </svg>
                <div class="love-text">
                    <div>ချစ်တယ် ❤️</div>
                    <div class="sub-text">မင်းလေးတစ်ယောက်တည်းကိုပဲ...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var neonColors = ['#ff0055', '#00f0ff', '#bd00ff', '#00ff66', '#ff00aa', '#ffaa00', '#ff00ff', '#00ffff'];
        var romanticShapes = ['❤️', '💖', '💝', '💘', '💕', '💗', '💓', '💞', '🌸', '🌹', '✨', '💎'];
        
        var colorIndex = 0;
        var shapeIndex = 0;

        window.onload = function() {
            initAdvancedEffects();
            // အသည်းပုံတွေ အရပ် ၁၆ မျက်နှာကို တရစပ်ပေါက်ကွဲထွက်စေမည့် အရှိန်
            setInterval(createExplosiveElement, 40); 
            startNeonCycle();
        };

        function startNeonCycle() {
            var heartSvg = document.querySelector('.neon-heart-svg');
            var wings = document.querySelector('.heart-wings');
            var idx = 0;
            setInterval(function() {
                idx = (idx + 1) % neonColors.length;
                var nextColor = neonColors[idx];
                var wingColor = neonColors[(idx + 3) % neonColors.length];
                if (heartSvg) heartSvg.style.setProperty('--neon-color', nextColor);
                if (wings) wings.style.setProperty('--neon-color', wingColor);
            }, 1000);
        }

        // 💎 🚀 အလယ်ဗဟိုမှ အရပ် ၁၆ မျက်နှာသို့ လွင့်စင်ထွက်စေမည့် စနစ်အမှန်
        function createExplosiveElement() {
            var item = document.createElement('div');
            item.classList.add('burst-element');
            
            item.innerText = romanticShapes[shapeIndex];
            var randomColor = neonColors[colorIndex % neonColors.length];
            item.style.color = randomColor;

            shapeIndex = (shapeIndex + 1) % romanticShapes.length;
            colorIndex = (colorIndex + 1) % neonColors.length;
            
            item.style.fontSize = (Math.random() * 30 + 35) + 'px';
            
            // 🧭 အရပ် ၁၆ မျက်နှာ ဒီဂရီတွက်ချက်မှု
            var angleIndex = Math.floor(Math.random() * 16);
            var angle = (angleIndex / 16) * Math.PI * 2;
            
            // မျက်နှာပြင်အရွယ်အစားပေါ်မူတည်ပြီး အဝေးကြီးအထိ လွင့်ထွက်သွားစေရန် တွက်ချက်ခြင်း
            var maxDistance = Math.max(window.innerWidth, window.innerHeight);
            var moveX = Math.cos(angle) * maxDistance;
            var moveY = Math.sin(angle) * maxDistance;
            
            var duration = Math.random() * 2 + 3; 
            var uniqueStyleName = 'burstAnim_' + Math.random().toString(36).substr(2, 9);
            
            var styleSheet = document.createElement("style");
            // အလယ်ကနေ အပြင်ဘက်ကို တန်းထွက်သွားစေမည့် CSS
            styleSheet.innerText = `@keyframes ${uniqueStyleName} {
                0% { transform: translate(-50%, -50%) translate(0, 0) scale(0.3); opacity: 0; filter: drop-shadow(0 0 2px ${randomColor}) brightness(0.5); }
                15% { opacity: 1; filter: drop-shadow(0 0 15px ${randomColor}) brightness(1.5); }
                90% { opacity: 1; }
                100% { transform: translate(-50%, -50%) translate(${moveX}px, ${moveY}px) scale(1.2); opacity: 0; }
            }`;
            document.head.appendChild(styleSheet);
            
            item.style.animation = `${uniqueStyleName} ${duration}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
            
            document.body.appendChild(item);
            
            setTimeout(function() { 
                item.remove(); 
                styleSheet.remove();
            }, duration * 1000);
        }

        // 🎆 ✨ အနောက်ဘက်မှ မီးပန်းစနစ်
        function initAdvancedEffects() {
            var canvas = document.getElementById('starfield');
            if(!canvas) return;
            var ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            var stars = [];
            var fireworks = [];

            for(var i=0; i<60; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }

            function spawnFirework() {
                var targetX = Math.random() * canvas.width;
                var targetY = Math.random() * (canvas.height * 0.5) + 80;
                var fwColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                
                for(var j=0; j<25; j++) {
                    var angle = (j / 25) * Math.PI * 2;
                    var speed = Math.random() * 2 + 1;
                    fireworks.push({
                        x: targetX,
                        y: targetY,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        alpha: 1,
                        color: fwColor,
                        size: Math.random() * 2 + 2
                    });
                }
            }

            setInterval(spawnFirework, 2000);

            function draw() {
                if (!ctx || !canvas) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                stars.forEach(function(s) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                    s.y += s.speed;
                    if(s.y > canvas.height) s.y = 0;
    <!-- (အပေါ်မှာ HTML နဲ့ CSS ကုဒ်တွေ ရှိနေပါလိမ့်မယ်) -->

    <script>
        // (ဒီကြားထဲမှာ မီးပန်းတွေ တွက်ချက်တဲ့ ကုဒ်အစပိုင်းတွေ ရှိနေပါမယ်)

        // 👇 သင်မေးထားတဲ့ မီးပန်းကုဒ် အပိတ်ပိုင်းက ဒီလိုမျိုး နေရာမှာ ရှိနေရပါမယ်
        fireworks.forEach(function(f, index) {
            ctx.fillStyle = f.color;
            ctx.globalAlpha = f.alpha;
            ctx.font = (f.size * 4.5) + "px Arial";
            ctx.fillText("💖", f.x, f.y);
            f.x += f.vx;
            f.y += f.vy;
            f.alpha -= 0.015;
            if(f.alpha <= 0) {
                fireworks.splice(index, 1);
            }
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
        
    </script> <!-- 👈 သေချာပေါက် ပိတ်ပေးရမည့် Script Tag -->
</body>
</html>
