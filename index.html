<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { 
            background-color: #000; 
            overflow: hidden; 
            margin: 0; 
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .love-text {
            text-align: center;
            color: #ff4d6d;
            font-size: 3.5rem; /* စာသားကိုပါ နည်းနည်း ပိုကြီးပေးထားပါတယ် */
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.8);
            z-index: 10;
            animation: pulse 2s infinite;
        }

        .sub-text {
            font-size: 2rem; /* စာတန်းငယ်ကိုပါ ပိုကြီးပေးထားပါတယ် */
            color: #fff;
            margin-top: 15px;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 20px rgba(255, 77, 109, 0.8); }
            50% { transform: scale(1.05); text-shadow: 0 0 30px rgba(255, 77, 109, 1); }
            100% { transform: scale(1); text-shadow: 0 0 20px rgba(255, 77, 109, 0.8); }
        }

        .heart { 
            position: absolute; 
            color: #ff1a40; 
            animation: fall 5s linear infinite; /* ပိုကြီးလာလို့ အောက်ကျတဲ့နှုန်းကို ၅ စက္ကန့်အထိ ပိုနှေးပေးထားပါတယ် */
            user-select: none;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="love-text">
        <div>ချစ်တယ် ❤️</div>
        <div class="sub-text">မင်းလေးတစ်ယောက်တည်းကိုပဲ...</div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            
            // 👇 ဒီနေရာမှာ အသည်းပုံအရွယ်အစားကို အနည်းဆုံး ၇၀ မှ အကြီးဆုံး ၁၂၀ ပစ်ဆယ် (px) အထိ ၂ ဆကျော် ပိုကြီးအောင် ပြင်လိုက်ပါပြီ
            heart.style.fontSize = Math.random() * 50 + 70 + 'px'; 
            
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createHeart, 250); // ပုံကြီးသွားလို့ စခရင်မှာ ရှုပ်မနေအောင် ပွင့်နှုန်းကို မီလီစက္ကန့် ၂၅၀ ထားပေးပါတယ်
    </script>
</body>
</html>
