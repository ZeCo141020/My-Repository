<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { 
            background: radial-gradient(circle, #1a0006 0%, #000000 100%); 
            overflow: hidden; 
            margin: 0; 
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-content {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            pointer-events: none;
        }
        
        .center-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
        }

        /* 💖 အလယ်က အသည်းပုံစတိုင်လ်အသစ် (Soft Neon Glowing Fluid Heart) */
        .neon-heart-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .neon-heart-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: rgba(25, 0, 5, 0.85); 
            stroke: var(--neon-color, #ff3366);
            stroke-width: 1.5;
            stroke-linecap: round;
            /* နူးညံ့ပြီး လင်းပိုင်နေသော Glow အကျိုးသက်ရောက်မှု */
            filter: drop-shadow(0 0 15px var(--neon-color, #ff3366))
                    drop-shadow(0 0 40px var(--neon-color, #ff3366));
            animation: pulseGlow 1.4s infinite alternate ease-in-out;
            z-index: 2;
        }

        .heart-wings {
            position: absolute;
            font-size: 16rem;
            color: var(--neon-color, #00f0ff);
            opacity: 0.55;
            filter: drop-shadow(0 0 20px var(--neon-color, #00f0ff));
            animation: wingFlap 0.7s infinite alternate ease-in-out;
            z-index: 1;
            user-select: none;
        }

        @keyframes wingFlap {
            0% { transform: scaleX(0.85) scaleY(0.95); opacity: 0.35; }
            100% { transform: scaleX(1.15) scaleY(1.05); opacity: 0.65; }
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); }
        }
        
        .love-text {
            position: absolute;
            text-align: center;
            color: #fff;
            font-size: 2.5rem; 
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,0,0,1);
            pointer-events: none;
            z-index: 11; 
            width: 85%;
            margin-top: -25px; 
            animation: textPulse 1.4s infinite alternate ease-in-out;
        }

        .sub-text {
            font-size: 1.3rem;
            color: #ffd670;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        @keyframes textPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.04); }
        }

        /* ✨ ဖုန်းမထစ်စေရန် ပေါ့ပါးချောမွေ့အောင် ပြင်ဆင်ထားသော စာလုံးမှုန်ဒီဇိုင်း */
        .burst-element { 
            position: absolute; 
            user-select: none;
            z-index: 20;
            top: 50%; left: 50%;
            pointer-events: none;
            font-weight: bold;
            filter: drop-shadow(0 0 6px currentColor);
            will-change: transform, opacity; /* ဖုန်း Hardware ကို ပိုမိုမြန်ဆန်စေရန် ကူညီပေးသောစနစ် */
        }
    </style>
</head>
<body>

    <!-- မီးပန်းများနှင့် ကြယ်စင်မှုန်များဆွဲမည့်နေရာ -->
    <canvas id="starfield"></canvas>

    <!-- ဗဟိုချက် အချစ်နီယွန်ကမ္ဘာ -->
    <div class="main-content" id="mainContent">
        <div class="center-container">
            <div class="neon-heart-wrapper">
                <div class="heart-wings">🦋</div>
                <svg class="neon-heart-svg" viewBox="0 0 32 32">
                    <path d="M16,28.261L4.636,16.897C1.411,13.672,1.411,8.435,4.636,5.21c3.225-3.225,8.462-3.225,11.364,0 c2.902-3.225,8.139-3.225,11.364,0c3.225,3.225,3.225,8.462,0,11.687L16,28.261z" stroke-width="1.2" stroke-linejoin="round"/>
                </svg>
                <div class="love-text">
                    <div>ချစ်တယ် ❤️</div>
                    <div class="sub-text">မင်းလေးတစ်ယောက်တည်းကိုပဲ...</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        var neonColors = ['#ff3366', '#00f0ff', '#bd00ff', '#00ff66', '#ff00aa', '#ffaa00', '#ff00ff', '#00ffff'];
        var romanticShapes = ['❤️', '💖', '💝', '💘', '💕', '💗', '💓', '💞', '🌸', '🌹', '✨'];
        
        var colorIndex = 0;
        var shapeIndex = 0;

        window.onload = function() {
            initAdvancedEffects();
            // ဖုန်းမထစ်စေရန် အရှိန်ကို အသင့်တော်ဆုံး ၅၀ မီလီစက္ကန့် ညှိပေးထားပါတယ်
            setInterval(createExplosiveElement, 50); 
            startNeonCycle();
        };

        function startNeonCycle() {
            var heartSvg = document.querySelector('.neon-heart-svg');
            var wings = document.querySelector('.heart-wings');
            var idx = 0;
            setInterval(function() {
                idx = (idx + 1) % neonColors.length;
                var nextColor = neonColors[idx];
                var wingColor = neonColors[(idx + 3) % neonColors.length];
                if (heartSvg) heartSvg.style.setProperty('--neon-color', nextColor);
                if (wings) wings.style.setProperty('--neon-color', wingColor);
            }, 1200);
        }

        function createExplosiveElement() {
            var item = document.createElement('div');
            item.classList.add('burst-element');
            
            item.innerText = romanticShapes[shapeIndex];
            var randomColor = neonColors[colorIndex % neonColors.length];
            item.style.color = randomColor;

            shapeIndex = (shapeIndex + 1) % romanticShapes.length;
            colorIndex = (colorIndex + 1) % neonColors.length;
            
            item.style.fontSize = (Math.random() * 20 + 32) + 'px'; 
            
            var angleIndex = Math.floor(Math.random() * 16);
            var angle = (angleIndex / 16) * Math.PI * 2;
            
            var maxDistance = Math.max(window.innerWidth, window.innerHeight) * 0.75;
            var duration = Math.random() * 1.5 + 2.5; 
            var uniqueStyleName = 'burstAnim_' + Math.random().toString(36).substr(2, 9);
            
            // 🌊 ဖုန်းမှာ အချောမွေ့ဆုံးဖြစ်မည့် အလှိုင်းအတွန့် ဖော်မြူလာ
            var amp = Math.random() * 50 + 30; 
            var moveX1 = Math.cos(angle) * (maxDistance * 0.3) + Math.sin(angle) * amp;
            var moveY1 = Math.sin(angle) * (maxDistance * 0.3) - Math.cos(angle) * amp;
            var moveX2 = Math.cos(angle) * (maxDistance * 0.65) - Math.sin(angle) * amp;
            var moveY2 = Math.sin(angle) * (maxDistance * 0.65) + Math.cos(angle) * amp;
            var finalX = Math.cos(angle) * maxDistance;
            var finalY = Math.sin(angle) * maxDistance;

            var styleSheet = document.createElement("style");
            styleSheet.innerText = `@keyframes ${uniqueStyleName} {
                0% { transform: translate(-50%, -50%) translate(0, 0) scale(0.4) rotate(0deg); opacity: 0; }
                15% { opacity: 1; }
                40% { transform: translate(-50%, -50%) translate(${moveX1}px, ${moveY1}px) scale(0.9) rotate(180deg); }
                70% { transform: translate(-50%, -50%) translate(${moveX2}px, ${moveY2}px) scale(1.3) rotate(420deg); opacity: 1; }
                100% { transform: translate(-50%, -50%) translate(${finalX}px, ${finalY}px) scale(0.7) rotate(720deg); opacity: 0; }
            }`;
            document.head.appendChild(styleSheet);
            
            item.style.animation = `${uniqueStyleName} ${duration}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
            
            document.body.appendChild(item);
            
            setTimeout(function() { 
                item.remove(); 
                styleSheet.remove();
            }, duration * 1000);
        }
        function initAdvancedEffects() {
            var canvas = document.getElementById('starfield');
            if(!canvas) return;
            var ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            var stars = [];
            var fireworks = [];

            for(var i=0; i<45; i++) { /* ဖုန်းပိုပေါ့ပါးစေရန် ကြယ်အရေအတွက်ကို လျှော့ညှိထားပါသည် */
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.2 + 0.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }

            function spawnFirework() {
                var targetX = Math.random() * canvas.width;
                var targetY = Math.random() * (canvas.height * 0.6) + 60;
                var fwColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                
                // ပေါက်ကွဲမှုန်အရေအတွက်ကို ၃၅ စီဖြင့် အချောမွေ့ဆုံးဖြစ်အောင် ပြင်ထားပါသည်
                for(var j=0; j<35; j++) {
                    var angle = (j / 35) * Math.PI * 2;
                    var speed = Math.random() * 3 + 1.2; 
                    fireworks.push({
                        x: targetX,
                        y: targetY,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        alpha: 1,
                        color: fwColor,
                        size: Math.random() * 1.8 + 2.2
                    });
                }
            }

            // ၄၅၀ မီလီစက္ကန့်တိုင်း မီးပန်းများ ဝေဆာစွာ ပေါက်ကွဲစေခြင်း
            setInterval(spawnFirework, 450);

            function draw() {
                if (!ctx || !canvas) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
                stars.forEach(function(s) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                    s.y += s.speed;
                    if(s.y > canvas.height) s.y = 0;
                });

                fireworks.forEach(function(f, index) {
                    ctx.fillStyle = f.color;
                    ctx.globalAlpha = f.alpha;
                    
                    // ဖုန်းမထစ်စေရန် လေးလံသော shadowBlur အစား ရိုးရိုး font အလှဖြင့် ထိန်းထားပါသည်
                    ctx.font = (f.size * 4.8) + "px Arial";
                    ctx.fillText("💖", f.x, f.y);
                    
                    f.x += f.vx;
                    f.y += f.vy;
                    f.alpha -= 0.012; 
                    
                    if(f.alpha <= 0) {
                        fireworks.splice(index, 1);
                    }
                });
                ctx.globalAlpha = 1;

                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
