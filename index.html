<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { 
            background: radial-gradient(circle, #1a0007 0%, #000000 100%); 
            overflow: hidden; 
            margin: 0; 
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-content {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        /* 🌟 အသည်းပုံနှင့် စာသားကို တွဲဖက်ထားသော အလယ်ဗဟို Container */
        .neon-heart-wrapper {
            position: relative;
            width: 340px;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .neon-heart-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: rgba(20, 0, 5, 0.6); /* စာသားများ ထင်ရှားစေရန် အတွင်းပိုင်းကို အမည်းရောင် ခပ်မှိန်မှိန် ပေးထားခြင်း */
            stroke: var(--neon-color, #ff0055);
            stroke-width: 1.5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 12px var(--neon-color, #ff0055))
                    drop-shadow(0 0 30px var(--neon-color, #ff0055))
                    drop-shadow(0 0 60px var(--neon-color, #ff0055));
            animation: pulseGlow 1.2s infinite alternate ease-in-out;
            z-index: 2;
        }

        .heart-wings {
            position: absolute;
            font-size: 16rem;
            color: var(--neon-color, #00f0ff);
            opacity: 0.6;
            filter: drop-shadow(0 0 25px var(--neon-color, #00f0ff));
            animation: wingFlap 0.6s infinite alternate ease-in-out;
            z-index: 1;
            user-select: none;
        }

        @keyframes wingFlap {
            0% { transform: scaleX(0.85) scaleY(1); opacity: 0.4; }
            100% { transform: scaleX(1.15) scaleY(1.05); opacity: 0.7; }
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        
        /* ✍️ အသည်းပုံကြီးအတွင်း ကွက်တိကျစေမည့် စာသားဒီဇိုင်း */
        .love-text {
            position: absolute;
            text-align: center;
            color: #fff;
            font-size: 2.5rem; /* အသည်းပုံထဲ ကွက်တိဝင်အောင် အရွယ်အစား ညှိထားပါသည် */
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,0,0,1);
            pointer-events: none;
            z-index: 11; /* SVG ရဲ့ အပေါ်မှာ ထပ်နေစေရန် */
            width: 80%;
            margin-top: -30px; /* အသည်းပုံအလယ်ဗဟို ရောက်စေရန် */
            animation: textPulse 1.2s infinite alternate ease-in-out;
        }

        .sub-text {
            font-size: 1.3rem;
            color: #ffd670;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        @keyframes textPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* 💎 အရပ် ၁၆ မျက်နှာသို့ လွင့်စင်မည့် ကွန်ပျူတာမှုန်များ */
        .burst-element { 
            position: absolute; 
            user-select: none;
            z-index: 5;
            animation: twinkle 0.2s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; filter: drop-shadow(0 0 2px currentColor) brightness(0.6); }
            100% { opacity: 1; filter: drop-shadow(0 0 25px currentColor) brightness(1.8); }
        }
    </style>
</head>
<body>

    <div class="main-content" id="mainContent">
        <canvas id="starfield"></canvas>
        
        <!-- 🌟 စာသားများ အသည်းပုံအတွင်း ကွက်တိပါဝင်သော ဖွဲ့စည်းမှု -->
        <div class="neon-heart-wrapper">
            <div class="heart-wings">🦋</div>
            
            <svg class="neon-heart-svg" viewBox="0 0 32 32">
                <!-- စစ်မှန်သော နီယွန်အသည်းပုံသီးသန့် လမ်းကြောင်း (အကြောင်း ၃ ကြောင်း လုံးဝဖြုတ်ထားပါသည်) -->
                <path d="M16,28.261L4.636,16.897C1.411,13.672,1.411,8.435,4.636,5.21c3.225-3.225,8.462-3.225,11.364,0 c2.902-3.225,8.139-3.225,11.364,0c3.225,3.225,3.225,8.462,0,11.687L16,28.261z" stroke-width="1.2" stroke-linejoin="round"/>
            </svg>

            <div class="love-text">
                <div>ချစ်တယ် ❤️</div>
                <div class="sub-text">မင်းလေးတစ်ယောက်တည်းကိုပဲ...</div>
            </div>
        </div>
    </div>

    <script>
        var neonColors = ['#ff0055', '#00f0ff', '#bd00ff', '#00ff66', '#ff00aa', '#ffaa00', '#ff00ff', '#00ffff'];
        var romanticShapes = ['❤️', '💖', '💝', '💘', '💕', '💗', '💓', '💞', '🌸', '🌹', '✨', '💎'];
        
        var colorIndex = 0;
        var shapeIndex = 0;

        window.onload = function() {
            initAdvancedEffects();
            // 👇 အရပ်မျက်နှာအနှံ့ကို မုန်တိုင်းအလား တရစပ်ပေါက်ကွဲထွက်စေရန် အချိန်ကို မီလီစက္ကန့် ၄၀ စီပဲ ထားရှိပါသည်
            setInterval(createExplosiveElement, 40); 
            startNeonCycle();
        };

        function startNeonCycle() {
            var heartSvg = document.querySelector('.neon-heart-svg');
            var wings = document.querySelector('.heart-wings');
            var idx = 0;
            setInterval(function() {
                idx = (idx + 1) % neonColors.length;
                var nextColor = neonColors[idx];
                var wingColor = neonColors[(idx + 3) % neonColors.length];
                
                if (heartSvg) heartSvg.style.setProperty('--neon-color', nextColor);
                if (wings) wings.style.setProperty('--neon-color', wingColor);
            }, 1000);
        }

        // 💎 🚀 အရပ် ၁၆ မျက်နှာသို့ အလယ်ဗဟိုမှ ပေါက်ကွဲထွက်စေမည့် စနစ်အသစ်
        function createExplosiveElement() {
            var item = document.createElement('div');
            item.classList.add('burst-element');
            
            item.innerText = romanticShapes[shapeIndex];
            var randomColor = neonColors[colorIndex % neonColors.length];
            item.style.color = randomColor;

            shapeIndex = (shapeIndex + 1) % romanticShapes.length;
            colorIndex = (colorIndex + 1) % neonColors.length;
            
            // စခရင်အလယ်ဗဟို တည့်တည့်မှ စတင်မွေးဖွားခြင်း
            item.style.left = '50vw';
            item.style.top = '50vh';
            item.style.fontSize = (Math.random() * 40 + 35) + 'px';
            
            // 🧭 အရပ် ၁၆ မျက်နှာတွက်ချက်မှု (၃၆၀ ဒီဂရီကို ၁၆ ပိုင်း ခွဲခြားခြင်း)
            var angleIndex = Math.floor(Math.random() * 16);
            var angle = (angleIndex / 16) * Math.PI * 2;
            
            // ပေါက်ကွဲလွင့်စင်မည့် အရှိန်အဟုန်အနိမ့်အမြင့်
            var velocity = Math.random() * 300 + 150; 
            var moveX = Math.cos(angle) * velocity;
            var moveY = Math.sin(angle) * velocity;
            
            // CSS Keyframes ကို JavaScript ထဲမှာ တိုက်ရိုက်ဖန်တီးမောင်းနှင်ခြင်း
            var duration = Math.random() * 2 + 2; 
            var uniqueStyleName = 'burstAnim_' + Math.random().toString(36).substr(2, 9);
            
            var styleSheet = document.createElement("style");
            styleSheet.innerText = `@keyframes ${uniqueStyleName} {
                0% { transform: translate(-50%, -50%) translate(0, 0) scale(0.3) rotate(0deg); opacity: 0; }
                15% { opacity: 1; }
                90% { opacity: 1; }
                100% { transform: translate(-50%, -50%) translate(${moveX}px, ${moveY}px) scale(1.3) rotate(720deg); opacity: 0; }
            }`;
            document.head.appendChild(styleSheet);
            
            item.style.animation = `${uniqueStyleName} ${duration}s linear forwards, twinkle ${Math.random() * 0.1 + 0.15}s ease-in-out infinite alternate`;
            
            document.body.appendChild(item);
            
            // Animation ပြေးပြီးလျှင် ဖျက်ပစ်ခြင်း
            setTimeout(function() { 
                item.remove(); 
                styleSheet.remove();
            }, duration * 1000);
        }

        // 🎆 ✨ အနောက်ဘက်မြေပြင်မှ ကြယ်စင်မှုန်များနှင့် စစ်မှန်သော နီယွန်မီးပန်းစနစ်
        function initAdvancedEffects() {
            var canvas = document.getElementById('starfield');
            if(!canvas) return;
            var ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            var stars = [];
            var fireworks = [];

            for(var i=0; i<60; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }

            // 🎆 အသည်းပုံ နီယွန်မီးပန်းမှုန်များ ဆွဲသည့်စနစ်
            function spawnFirework() {
                var targetX = Math.random() * canvas.width;
                var targetY = Math.random() * (canvas.height * 0.5) + 80;
                var fwColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                
                // မှုန်ရေ ၃၀ ဖြင့် အသည်းပုံစံ ဖြာထွက်စေခြင်း
                for(var j=0; j<30; j++) {
                    var angle = (j / 30) * Math.PI * 2;
                    var speed = Math.random() * 2.5 + 1.2;
                    fireworks.push({
                        x: targetX,
                        y: targetY,
                        vx: Math.cos(angle) * speed,
