<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { 
            background: radial-gradient(circle, #100005 0%, #000000 100%); 
            overflow: hidden; 
            margin: 0; 
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 🎁 စတင်ဖွင့်ချိန်တွင် ပေါ်မည့် Surprise ဘူး ဒီဇိုင်း */
        .intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease-in-out;
        }

        .gift-box {
            font-size: 6rem;
            cursor: pointer;
            animation: bounce 1.5s infinite alternate;
            filter: drop-shadow(0 0 20px #ff4d6d);
        }

        .click-text {
            color: #fff;
            margin-top: 20px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            animation: pulseText 1s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.1) translateY(-20px); }
        }

        @keyframes pulseText {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* ပင်မမျက်နှာပြင် */
        .main-content {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .center-container {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* 🔋 ⚡ အလယ်က အားသွင်းနီယွန်အသည်းပုံ ဒီဇိုင်းကြီး */
        .charging-heart-box {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        /* SVG အသည်းပုံကို ရောင်စုံနီယွန် Glow ဖြစ်စေခြင်း */
        .heart-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 25px var(--glow-color, #ff2a55));
            animation: pulseGlow 2s infinite alternate, colorShift 8s infinite linear;
        }

        /* အသည်းပုံအတွင်းပိုင်း အားသွင်းလှိုင်း Animation */
        .wave-fill {
            animation: waveAnim 3s infinite linear;
        }

        @keyframes waveAnim {
            0% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-5px) translateX(-20px); }
            100% { transform: translateY(0) translateX(-40px); }
        }

        /* ⚡ လျှပ်စီးအလင်းတန်း Icon */
        .lightning-bolt {
            position: absolute;
            bottom: -35px;
            font-size: 3.5rem;
            color: #ffd670;
            filter: drop-shadow(0 0 15px #ffd670);
            animation: flash 1s infinite alternate;
        }

        @keyframes flash {
            0% { opacity: 0.6; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* အရောင်စုံကို အလိုအလျောက် ပြောင်းလဲစေသောစနစ် */
        @keyframes colorShift {
            0% { --glow-color: #ff2a55; }
            25% { --glow-color: #00f0ff; }
            50% { --glow-color: #bd00ff; }
            75% { --glow-color: #00ff66; }
            100% { --glow-color: #ff2a55; }
        }
        
        .love-text {
            text-align: center;
            color: #fff;
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,0,0,1);
            pointer-events: none;
            margin-top: 40px;
        }

        .sub-text {
            font-size: 2rem;
            color: #ffd670;
            margin-top: 15px;
            text-shadow: 0 0 15px rgba(0,0,0,1);
        }

        /* ဘေးပတ်လည်က ရောင်စုံမှိတ်တုတ်မှိတ်တုတ် ကျဆင်းမည့် အရာများ */
        .falling-element { 
            position: absolute; 
            user-select: none;
            animation: fall 6s linear forwards, twinkle 1.5s ease-in-out infinite alternate;
            z-index: 5;
        }

        @keyframes fall {
            0% { transform: translateY(-120px) rotate(0deg) scale(0.5); }
            100% { transform: translateY(100vh) rotate(360deg) scale(1); }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; filter: drop-shadow(0 0 2px currentColor); }
            100% { opacity: 1; filter: drop-shadow(0 0 15px currentColor); }
        }
    </style>
</head>
<body>

    <!-- ၁။ အစဦး Surprise ဘူးစခရင် -->
    <div class="intro-screen" id="introScreen">
        <div class="gift-box" onclick="startSurprise()">🎁</div>
        <div class="click-text">မင်းအတွက် Surprise လေးမို့ နှိပ်ကြည့်ပါဦး...</div>
    </div>

    <!-- ၂။ ပင်မအချစ်ကမ္ဘာမျက်နှာပြင် -->
    <div class="main-content" id="mainContent">
        <canvas id="starfield"></canvas>
        
        <div class="center-container">
            <!-- 🔋 ⚡ အားသွင်းဒီဇိုင်း နီယွန်အသည်းပုံဖွဲ့စည်းမှု -->
            <div class="charging-heart-box">
                <svg class="heart-svg" viewBox="0 0 32 32">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="100%" x2="0%" y2="0%">
                            <stop offset="0%" stop-color="#ff2a55" />
                            <stop offset="40%" stop-color="#ff70a6" />
                            <stop offset="41%" stop-color="transparent" />
                            <stop offset="100%" stop-color="transparent" />
                        </linearGradient>
                    </defs>
                    <!-- အသည်းပုံ Outline အပြင်ဘောင် -->
                    <path d="M16,28.261L4.636,16.897C1.411,13.672,1.411,8.435,4.636,5.21c3.225-3.225,8.462-3.225,11.364,0 l0,0l0,0c2.902-3.225,8.139-3.225,11.364,0c3.225,3.225,3.225,8.462,0,11.687L16,28.261z" 
                          fill="url(#grad)" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    <!-- အောက်ခြေ အားသွင်းအဆင့်လိုင်းတိုလေးများ -->
                    <line x1="12" y1="21" x2="20" y2="21" stroke="white" stroke-width="1"/>
                    <line x1="13" y1="23" x2="19" y2="23" stroke="white" stroke-width="1"/>
                    <line x1="14" y1="25" x2="18" y2="25" stroke="white" stroke-width="1"/>
                </svg>
                <!-- ⚡ လျှပ်စီးအလင်း -->
                <div class="lightning-bolt">⚡</div>
            </div>

            <div class="love-text">
                <div>ချစ်တယ် ❤️</div>
                <div class="sub-text">မင်းလေးတစ်ယောက်တည်းကိုပဲ...</div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://mixkit.co" type="audio/wav">
    </audio>

    <script>
        // ကောင်မလေး သဘောကျမည့် နီယွန်အရောင်စုံ ရှစ်မျိုး
        const colors = ['#ff1a40', '#00f0ff', '#bd00ff', '#ffd670', '#00ff66', '#ff70a6', '#ff9770', '#e9ff70'];
        const romanticShapes = ['❤️', '💖', '💝', '💘', '💕', '💗', '💓', '💞', '🌸', '✨'];
        
        let colorIndex = 0;
        let shapeIndex = 0;
        let animationActive = false;

        function startSurprise() {
            document.getElementById('introScreen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('introScreen').style.display = 'none';
                const main = document.getElementById('mainContent');
                main.style.display = 'flex';
                setTimeout(() => main.style.opacity = 1, 50);
                
                document.getElementById('bgMusic').play().catch(() => {});
                animationActive = true;
                initStarfield();
                setInterval(createRomanticElement, 250);
                startDynamicColors();
            }, 1000);
        }

        // အလယ်က အသည်းပုံကြီးရဲ့ နီယွန်မီးရောင်ကို စက္ကန့်အလိုက် တစ်ရောင်ပြီးတစ်ရောင် ငြိမ့်ညောင်းစွာ ပြောင်းလဲစေခြင်း
        function startDynamicColors() {
            const heartSvg = document.querySelector('.heart-svg');
            let idx = 0;
            setInterval(() => {
                idx = (idx + 1) % colors.length;
                heartSvg.style.setProperty('--glow-color', colors[idx]);
                heartSvg.style.color = colors[idx];
            }, 2000);
        }

        function createRomanticElement() {
            if(!animationActive) return;
            const item = document.createElement('div');
            item.classList.add('falling-element');
            
            item.innerText = romanticShapes[shapeIndex];
            const randomColor = colors[colorIndex];
            item.style.color = randomColor;

            shapeIndex = (shapeIndex + 1) % romanticShapes.length;
            colorIndex = (colorIndex + 1) % colors.length;
            
            item.style.left = Math.random() * 92 + 4 + 'vw';
            item.style.fontSize = Math.random() * 30 + 45 + 'px'; 
            
            const duration = Math.random() * 2 + 5;
