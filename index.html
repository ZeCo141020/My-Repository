<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { 
            background: radial-gradient(circle, #0a0003 0%, #000000 100%); 
            overflow: hidden; 
            margin: 0; 
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 🎁 စတင်ဖွင့်ချိန်တွင် ပေါ်မည့် Surprise ဘူး ဒီဇိုင်း */
        .intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease-in-out;
        }

        .gift-box {
            font-size: 6rem;
            cursor: pointer;
            animation: bounce 1.5s infinite alternate;
            filter: drop-shadow(0 0 20px #ff4d6d);
        }

        .click-text {
            color: #fff;
            margin-top: 20px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            animation: pulseText 1s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.1) translateY(-20px); }
        }

        @keyframes pulseText {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* ပင်မမျက်နှာပြင် */
        .main-content {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .center-container {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* ⚡ 💡 Cyber Neon Heart အလယ်က ကွန်တိန်နာ */
        .neon-heart-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* စစ်မှန်သော နီယွန်မီးချောင်း အကျိုးသက်ရောက်မှု */
        .neon-heart-svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--neon-color, #ff0055);
            stroke-width: 1.5;
            stroke-linecap: round;
            /* ဆန်းပြားသော နီယွန်အလင်းတန်း ၃ ထပ်ပေးထားခြင်း */
            filter: drop-shadow(0 0 5px var(--neon-color, #ff0055))
                    drop-shadow(0 0 15px var(--neon-color, #ff0055))
                    drop-shadow(0 0 35px var(--neon-color, #ff0055));
            animation: pulseGlow 1.5s infinite alternate ease-in-out, neonFlicker 4s infinite linear;
        }

        /* ⚡ လျှပ်စီး Icon နေရာချခြင်း */
        .neon-lightning {
            position: absolute;
            bottom: -20px;
            font-size: 4rem;
            color: #fff;
            animation: boltFlicker 2s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.08); opacity: 1; }
        }

        /* မီးချောင်း တဖျတ်ဖျတ်လက်သည့် အထာကျသော စတိုင်လ် */
        @keyframes neonFlicker {
            0%, 100% { opacity: 1; }
            41% { opacity: 0.95; }
            42% { opacity: 1; }
            43% { opacity: 0.85; }
            44% { opacity: 1; }
        }

        @keyframes boltFlicker {
            0% { color: #00f0ff; filter: drop-shadow(0 0 10px #00f0ff) drop-shadow(0 0 25px #00f0ff); transform: scale(0.95) rotate(-5deg); }
            100% { color: #ff00ff; filter: drop-shadow(0 0 15px #ff00ff) drop-shadow(0 0 35px #ff00ff); transform: scale(1.05) rotate(5deg); }
        }
        
        .love-text {
            text-align: center;
            color: #fff;
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,0,0,1);
            pointer-events: none;
            margin-top: 45px;
        }

        .sub-text {
            font-size: 2rem;
            color: #ffd670;
            margin-top: 15px;
            text-shadow: 0 0 15px rgba(0,0,0,1);
        }

        /* ဘေးပတ်လည်က ရောင်စုံမှိတ်တုတ်မှိတ်တုတ် ကျဆင်းမည့် စာသားများ */
        .falling-element { 
            position: absolute; 
            user-select: none;
            animation: fall 6s linear forwards, twinkle 1.5s ease-in-out infinite alternate;
            z-index: 5;
        }

        @keyframes fall {
            0% { transform: translateY(-120px) rotate(0deg) scale(0.5); }
            100% { transform: translateY(100vh) rotate(360deg) scale(1); }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; filter: drop-shadow(0 0 2px currentColor); }
            100% { opacity: 1; filter: drop-shadow(0 0 15px currentColor); }
        }
    </style>
</head>
<body>

    <!-- ၁။ အစဦး Surprise ဘူးစခရင် -->
    <div class="intro-screen" id="introScreen">
        <div class="gift-box" onclick="startSurprise()">🎁</div>
        <div class="click-text">ယူမီအတွက် Surprise လေးမို့ နှိပ်ကြည့်ပါဦး...</div>
    </div>

    <!-- ၂။ ပင်မအချစ်ကမ္ဘာမျက်နှာပြင် -->
    <div class="main-content" id="mainContent">
        <canvas id="starfield"></canvas>
        
        <div class="center-container">
            <!-- ⚡ 💡 Cyber Neon Heart အလယ်ဗဟိုဖွဲ့စည်းမှု -->
            <div class="neon-heart-wrapper">
                <svg class="neon-heart-svg" viewBox="0 0 32 32">
                    <!-- တိကျလှပသော Vector နီယွန်အသည်းပုံလမ်းကြောင်း -->
                    <path d="M16,28.261L4.636,16.897C1.411,13.672,1.411,8.435,4.636,5.21c3.225-3.225,8.462-3.225,11.364,0 c2.902-3.225,8.139-3.225,11.364,0c3.225,3.225,3.225,8.462,0,11.687L16,28.261z" 
                          stroke-width="1.2" stroke-linejoin="round"/>
                    <!-- အောက်ခြေ အားသွင်းအဆင့်လိုင်းတိုလေးများ -->
                    <line x1="11" y1="20" x2="21" y2="20" stroke="white" stroke-width="0.8" opacity="0.8"/>
                    <line x1="12.5" y1="22" x2="19.5" y2="22" stroke="white" stroke-width="0.8" opacity="0.6"/>
                    <line x1="14" y1="24" x2="18" y2="24" stroke="white" stroke-width="0.8" opacity="0.4"/>
                </svg>
                <!-- ⚡ နီယွန် လျှပ်စီး -->
                <div class="neon-lightning">⚡</div>
            </div>

            <div class="love-text">
                <div>ချစ်တယ် ❤️</div>
                <div class="sub-text">မင်းလေးတစ်ယောက်တည်းကိုပဲ...</div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://mixkit.co" type="audio/wav">
    </audio>

    <script>
        // Cyberpunk ဆန်သော တောက်ပသည့် နီယွန်ရောင်စုံ ခြောက်မျိုး
        const neonColors = ['#ff0055', '#00f0ff', '#bd00ff', '#00ff66', '#ff00aa', '#ffaa00'];
        const romanticShapes = ['❤️', '💖', '💝', '💘', '💕', '💗', '💓', '💞', '🌸', '✨'];
        
        let colorIndex = 0;
        let shapeIndex = 0;
        let animationActive = false;

        function startSurprise() {
            document.getElementById('introScreen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('introScreen').style.display = 'none';
                const main = document.getElementById('mainContent');
                main.style.display = 'flex';
                setTimeout(() => main.style.opacity = 1, 50);
                
                document.getElementById('bgMusic').play().catch(() => {});
                animationActive = true;
                initStarfield();
                setInterval(createRomanticElement, 250);
                startNeonCycle();
            }, 1000);
        }

        // အလယ်က အသည်းပုံကြီးရဲ့ နီယွန်အရောင်ကို စက္ကန့်အလိုက် ငြိမ့်ညောင်းစွာ စီးဆင်းပြောင်းလဲစေခြင်း
        function startNeonCycle() {
            const heartSvg = document.querySelector('.neon-heart-svg');
            let idx = 0;
            setInterval(() => {
                idx = (idx + 1) % neonColors.length;
                heartSvg.style.setProperty('--neon-color', neonColors[idx]);
            }, 1500);
        }

        function createRomanticElement() {
            if(!animationActive) return;
            const item = document.createElement('div');
            item.classList.add('falling-element');
            
            item.innerText = romanticShapes[shapeIndex];
            const randomColor = neonColors[colorIndex % neonColors.length];
            item.style.color = randomColor;

            shapeIndex = (shapeIndex + 1) % romanticShapes.length;
            colorIndex = (colorIndex + 1) % neonColors.length;
            
            item.style.left = Math.random() * 92 + 4 + 'vw';
            item.style.fontSize = Math.random() * 25 + 50 + 'px'; 
            
            const duration = Math.random() * 2 + 5;
            item.style.animationName = 'fall, twinkle';
            item.style.animationDuration = `${duration}s, ${Math.random() * 0.5 + 0.8}s`;
            
            document.body.appendChild(item);
            setTimeout(() => item.remove(), duration * 1000);
        }

        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
