<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { 
            background: radial-gradient(circle, #22000a 0%, #050002 50%, #000000 100%); 
            overflow: hidden; 
            margin: 0; 
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-content {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            pointer-events: none;
        }
        
        .center-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
        }

        .neon-heart-wrapper {
            position: relative;
            width: 340px;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .neon-heart-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: rgba(10, 0, 3, 0.85); 
            stroke: var(--neon-color, #ff0055);
            stroke-width: 1.8;
            stroke-linecap: round;
            filter: drop-shadow(0 0 15px var(--neon-color, #ff0055))
                    drop-shadow(0 0 35px var(--neon-color, #ff0055))
                    drop-shadow(0 0 75px var(--neon-color, #ff0055));
            animation: pulseGlow 1s infinite alternate ease-in-out;
            z-index: 2;
        }

        .heart-wings {
            position: absolute;
            font-size: 17rem;
            color: var(--neon-color, #00f0ff);
            opacity: 0.65;
            filter: drop-shadow(0 0 25px var(--neon-color, #00f0ff));
            animation: wingFlap 0.5s infinite alternate ease-in-out;
            z-index: 1;
            user-select: none;
        }

        @keyframes wingFlap {
            0% { transform: scaleX(0.8) scaleY(0.95); opacity: 0.4; }
            100% { transform: scaleX(1.2) scaleY(1.05); opacity: 0.75; }
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        
        .love-text {
            position: absolute;
            text-align: center;
            color: #fff;
            font-size: 2.6rem; 
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,0,0,1);
            pointer-events: none;
            z-index: 11; 
            width: 85%;
            margin-top: -30px; 
            animation: textPulse 1s infinite alternate ease-in-out;
        }

        .sub-text {
            font-size: 1.35rem;
            color: #ffd670;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        @keyframes textPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); }
        }

        /* 💎 အထပ်ထပ် 3D ရောင်စုံနီယွန်ကျောက်မျက်များ */
        .burst-element { 
            position: absolute; 
            user-select: none;
            z-index: 20;
            top: 50%; left: 50%;
            pointer-events: none;
            font-weight: bold;
            /* သက်တံရောင် နီယွန်အလင်းတန်း (3D Neon Overlay Effects) */
            filter: drop-shadow(0 0 8px currentColor) drop-shadow(0 0 20px currentColor) contrast(1.5);
            mix-blend-mode: screen;
        }
    </style>
</head>
<body>

    <!-- အဆင့်မြင့်မီးပန်းများနှင့် ကြယ်စင်မှုန်များဆွဲမည့်နေရာ -->
    <canvas id="starfield"></canvas>

    <!-- ဗဟိုချက် အချစ်နီယွန်ကမ္ဘာ -->
    <div class="main-content" id="mainContent">
        <div class="center-container">
            <div class="neon-heart-wrapper">
                <div class="heart-wings">🦋</div>
                <svg class="neon-heart-svg" viewBox="0 0 32 32">
                    <path d="M16,28.261L4.636,16.897C1.411,13.672,1.411,8.435,4.636,5.21c3.225-3.225,8.462-3.225,11.364,0 c2.902-3.225,8.139-3.225,11.364,0c3.225,3.225,3.225,8.462,0,11.687L16,28.261z" stroke-width="1.2" stroke-linejoin="round"/>
                </svg>
                <div class="love-text">
                    <div>အရမ်းချစ်တယ်</div>
                    <div class="sub-text">ယူမီတစ်ယောက်တည်းကိုပဲ...</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        var neonColors = ['#ff0055', '#00f0ff', '#bd00ff', '#00ff66', '#ff00aa', '#ffaa00', '#ff00ff', '#00ffff'];
        var romanticShapes = ['❤️', '💖', '💝', '💘', '💕', '💗', '💓', '💞', '🌸', '🌹', '✨', '💎'];
        
        var colorIndex = 0;
        var shapeIndex = 0;

        window.onload = function() {
            initAdvancedEffects();
            // ကောင်မလေး အံ့ဩသွားစေရန် ပေါက်ကွဲနှုန်းကို အစွမ်းကုန်မြှင့်ထားခြင်း (၂၅ မီလီစက္ကန့်တစ်ကြိမ်)
            setInterval(createExplosiveElement, 25); 
            startNeonCycle();
        };

        function startNeonCycle() {
            var heartSvg = document.querySelector('.neon-heart-svg');
            var wings = document.querySelector('.heart-wings');
            var idx = 0;
            setInterval(function() {
                idx = (idx + 1) % neonColors.length;
                var nextColor = neonColors[idx];
                var wingColor = neonColors[(idx + 4) % neonColors.length];
                if (heartSvg) heartSvg.style.setProperty('--neon-color', nextColor);
                if (wings) wings.style.setProperty('--neon-color', wingColor);
            }, 1000);
        }

        function createExplosiveElement() {
            var item = document.createElement('div');
            item.classList.add('burst-element');
            
            item.innerText = romanticShapes[shapeIndex];
            var randomColor = neonColors[colorIndex % neonColors.length];
            item.style.color = randomColor;

            shapeIndex = (shapeIndex + 1) % romanticShapes.length;
            colorIndex = (colorIndex + 1) % neonColors.length;
            
            // စာလုံးအရွယ်အစားကို ပိုမိုကြီးမားပြည့်စုံစေရန် မြှင့်တင်ခြင်း
            item.style.fontSize = (Math.random() * 30 + 40) + 'px'; 
            
            var angleIndex = Math.floor(Math.random() * 16);
            var angle = (angleIndex / 16) * Math.PI * 2;
            
            var maxDistance = Math.max(window.innerWidth, window.innerHeight) * 0.9;
            var duration = Math.random() * 1.2 + 2.3; // ပိုမိုမြန်ဆန်သွက်လက်စေရန်
            var uniqueStyleName = 'burstAnim_' + Math.random().toString(36).substr(2, 9);
            
            // 🌊 အထူးဆန်းပြားသော ၃ ဆင့် လှိုင်းတွန့်ကွေးညွတ်မှု သင်္ချာဖော်မြူလာ (S-Curve Advanced Waves)
            var freq = Math.random() * 4 + 2; 
            var amp = Math.random() * 80 + 40; 
            var moveX1 = Math.cos(angle) * (maxDistance * 0.25) + Math.sin(angle) * amp;
            var moveY1 = Math.sin(angle) * (maxDistance * 0.25) - Math.cos(angle) * amp;
            var moveX2 = Math.cos(angle) * (maxDistance * 0.6) - Math.sin(angle) * amp;
            var moveY2 = Math.sin(angle) * (maxDistance * 0.6) + Math.cos(angle) * amp;
            var finalX = Math.cos(angle) * maxDistance;
            var finalY = Math.sin(angle) * maxDistance;

            var styleSheet = document.createElement("style");
            // အရှိန်အဟုန်ပြင်းပြင်းဖြင့် လှိုင်းအတွန့် အထပ်ထပ် ပေါက်ကွဲထွက်သွားမည့် CSS Keyframes
            styleSheet.innerText = `@keyframes ${uniqueStyleName} {
                0% { transform: translate(-50%, -50%) translate(0, 0) scale(0.3) rotate(0deg); opacity: 0; }
                10% { opacity: 1; }
                35% { transform: translate(-50%, -50%) translate(${moveX1}px, ${moveY1}px) scale(0.9) rotate(240deg); }
                65% { transform: translate(-50%, -50%) translate(${moveX2}px, ${moveY2}px) scale(1.4) rotate(480deg); opacity: 1; }
                100% { transform: translate(-50%, -50%) translate(${finalX}px, ${finalY}px) scale(0.6) rotate(720deg); opacity: 0; }
            }`;
            document.head.appendChild(styleSheet);
            
            item.style.animation = `${uniqueStyleName} ${duration}s cubic-bezier(0.1, 0.8, 0.25, 1) forwards`;
            
            document.body.appendChild(item);
            
            setTimeout(function() { 
                item.remove(); 
                styleSheet.remove();
            }, duration * 1000);
        }
        function initAdvancedEffects() {
            var canvas = document.getElementById('starfield');
            if(!canvas) return;
            var ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            var stars = [];
            var fireworks = [];

            for(var i=0; i<60; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }

            // 🎆 စခရင်အနှံ့ နေရာစုံတွင် အသည်းပုံမီးပန်းများ အမြောက်အမြားဖောက်သည့် စနစ်
            function spawnFirework() {
                // စခရင်အပေါ်ပိုင်းတင်မကဘဲ တစ်ပြင်လုံးမှာ ပေါက်ကွဲစေရန် နေရာချခြင်း
                var targetX = Math.random() * canvas.width;
                var targetY = Math.random() * (canvas.height * 0.7) + 50;
                var fwColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                
                // ပေါက်ကွဲမှုန်အရေအတွက်ကို ၅၅ စီအထိ တိုးမြှင့်ပြီး ထူထူထပ်ထပ်ဖြစ်စေခြင်း
                for(var j=0; j<55; j++) {
                    var angle = (j / 55) * Math.PI * 2;
                    var speed = Math.random() * 4.5 + 1.5; 
                    fireworks.push({
                        x: targetX,
                        y: targetY,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        alpha: 1,
                        color: fwColor,
                        size: Math.random() * 2 + 2.8
                    });
                }
            }

            // ⚡ ၃၅၀ မီလီစက္ကန့် (၀.၃၅ စက္ကန့်) တိုင်း မီးပန်းများ တရစပ် ပေါက်ကွဲစေခြင်း
            setInterval(spawnFirework, 350);

            function draw() {
                if (!ctx || !canvas) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                stars.forEach(function(s) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                    s.y += s.speed;
                    if(s.y > canvas.height) s.y = 0;
                });

                fireworks.forEach(function(f, index) {
                    ctx.fillStyle = f.color;
                    ctx.globalAlpha = f.alpha;
                    
                    // 4K Neon Glow အထူးမီးရောင် စနစ်ထည့်သွင်းခြင်း
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = f.color;
                    
                    ctx.font = (f.size * 5) + "px Arial";
                    ctx.fillText("💖", f.x, f.y);
                    
                    f.x += f.vx;
                    f.y += f.vy;
                    f.alpha -= 0.01; // ပိုမိုကြာရှည်စွာ လင်းပိုင်နေစေရန် အနှေးချထားခြင်း
                    
                    if(f.alpha <= 0) {
                        fireworks.splice(index, 1);
                    }
                });
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
