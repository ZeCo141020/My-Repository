<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { 
            background: radial-gradient(circle, #0e0003 0%, #000000 100%); 
            overflow: hidden; 
            margin: 0; 
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-content {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .center-container {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .neon-heart-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* တောက်ပသော နီယွန်မီးချောင်း အကျိုးသက်ရောက်မှု */
        .neon-heart-svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--neon-color, #ff0055);
            stroke-width: 1.5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px var(--neon-color, #ff0055))
                    drop-shadow(0 0 20px var(--neon-color, #ff0055))
                    drop-shadow(0 0 40px var(--neon-color, #ff0055));
            animation: pulseGlow 1.5s infinite alternate ease-in-out;
        }

        .neon-lightning {
            position: absolute;
            bottom: -20px;
            font-size: 4.5rem;
            color: #fff;
            animation: boltFlicker 1.5s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.06); opacity: 1; }
        }

        @keyframes boltFlicker {
            0% { color: #00f0ff; filter: drop-shadow(0 0 10px #00f0ff) drop-shadow(0 0 30px #00f0ff); transform: scale(0.95); }
            100% { color: #ff00ff; filter: drop-shadow(0 0 15px #ff00ff) drop-shadow(0 0 35px #ff00ff); transform: scale(1.05); }
        }
        
        .love-text {
            text-align: center;
            color: #fff;
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,0,0,1);
            pointer-events: none;
            margin-top: 45px;
        }

        .sub-text {
            font-size: 2rem;
            color: #ffd670;
            margin-top: 15px;
            text-shadow: 0 0 15px rgba(0,0,0,1);
        }

        .falling-element { 
            position: absolute; 
            user-select: none;
            animation: fall 6s linear forwards, twinkle 1.5s ease-in-out infinite alternate;
            z-index: 5;
        }

        @keyframes fall {
            0% { transform: translateY(-120px) rotate(0deg) scale(0.5); }
            100% { transform: translateY(100vh) rotate(360deg) scale(1); }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; filter: drop-shadow(0 0 2px currentColor); }
            100% { opacity: 1; filter: drop-shadow(0 0 15px currentColor); }
        }
    </style>
</head>
<body>

    <div class="main-content" id="mainContent">
        <canvas id="starfield"></canvas>
        
        <div class="center-container">
            <div class="neon-heart-wrapper">
                <svg class="neon-heart-svg" viewBox="0 0 32 32">
                    <path d="M16,28.261L4.636,16.897C1.411,13.672,1.411,8.435,4.636,5.21c3.225-3.225,8.462-3.225,11.364,0 c2.902-3.225,8.139-3.225,11.364,0c3.225,3.225,3.225,8.462,0,11.687L16,28.261z" stroke-width="1.2" stroke-linejoin="round"/>
                    <line x1="11" y1="19" x2="21" y2="19" stroke="white" stroke-width="0.8" opacity="0.8"/>
                    <line x1="12.5" y1="21" x2="19.5" y2="21" stroke="white" stroke-width="0.8" opacity="0.6"/>
                    <line x1="14" y1="23" x2="18" y2="24" stroke="white" stroke-width="0.8" opacity="0.4"/>
                </svg>
                <div class="neon-lightning">⚡</div>
            </div>

            <div class="love-text">
                <div>ချစ်တယ် ❤️</div>
                <div class="sub-text">မင်းလေးတစ်ယောက်တည်းကိုပဲ...</div>
            </div>
        </div>
    </div>

    <script>
        var neonColors = ['#ff0055', '#00f0ff', '#bd00ff', '#00ff66', '#ff00aa', '#ffaa00'];
        var romanticShapes = ['❤️', '💖', '💝', '💘', '💕', '💗', '💓', '💞', '🌸', '✨'];
        
        var colorIndex = 0;
        var shapeIndex = 0;

        window.onload = function() {
            initStarfield();
            setInterval(createRomanticElement, 250);
            startNeonCycle();
        };

        function startNeonCycle() {
            var heartSvg = document.querySelector('.neon-heart-svg');
            var idx = 0;
            setInterval(function() {
                if (heartSvg) {
                    idx = (idx + 1) % neonColors.length;
                    heartSvg.style.setProperty('--neon-color', neonColors[idx]);
                }
            }, 1500);
        }

        function createRomanticElement() {
            var item = document.createElement('div');
            item.classList.add('falling-element');
            
            item.innerText = romanticShapes[shapeIndex];
            var randomColor = neonColors[colorIndex % neonColors.length];
            item.style.color = randomColor;

            shapeIndex = (shapeIndex + 1) % romanticShapes.length;
            colorIndex = (colorIndex + 1) % neonColors.length;
            
            item.style.left = (Math.random() * 92 + 4) + 'vw';
            item.style.fontSize = (Math.random() * 25 + 50) + 'px'; 
            
            var duration = Math.random() * 2 + 5;
            item.style.animationName = 'fall, twinkle';
            item.style.animationDuration = duration + 's, ' + (Math.random() * 0.5 + 0.8) + 's';
            
            document.body.appendChild(item);
            setTimeout(function() { item.remove(); }, duration * 1000);
        }

        function initStarfield() {
            var canvas = document.getElementById('starfield');
            if(!canvas) return;
            var ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            var stars = [];
            for(var i=0; i<60; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }

            function drawStars() {
                if (!ctx || !canvas) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
                stars.forEach(function(s) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2, true);
                    ctx.fill();
                    s.y += s.speed;
                    if(s.y > canvas.height) s.y = 0;
                });
                requestAnimationFrame(drawStars);
            }
            drawStars();
        }
    </script>
</body>
</html>
